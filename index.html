<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>贪吃蛇小游戏</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --accent: #3ddc97;
        --danger: #ff4d6d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 800px at 50% 20%, rgba(61, 220, 151, 0.18), transparent 55%),
          radial-gradient(900px 600px at 10% 90%, rgba(99, 102, 241, 0.16), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
      }

      .app {
        width: min(720px, calc(100vw - 24px));
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--panel);
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .title strong {
        font-size: 16px;
        letter-spacing: 0.2px;
      }

      .title span {
        font-size: 12px;
        color: var(--muted);
      }

      .stats {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      .pill b {
        color: var(--text);
        font-weight: 700;
      }

      .board-wrap {
        padding: 12px;
        border-radius: 14px;
        background: var(--panel);
      }

      .board {
        width: 100%;
        display: grid;
        place-items: center;
      }

      canvas {
        width: 100%;
        height: auto;
        image-rendering: pixelated;
        touch-action: none; /* 让移动端手势不触发页面滚动 */
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .hint {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 10px;
        font-weight: 600;
      }

      button:hover {
        border-color: rgba(255, 255, 255, 0.28);
      }

      button.primary {
        border-color: rgba(61, 220, 151, 0.35);
        background: rgba(61, 220, 151, 0.16);
      }

      .overlay {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px dashed rgba(255, 255, 255, 0.14);
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .overlay b {
        color: var(--text);
      }

      /* 手机端：提供触控方向控制 */
      .mobile-controls {
        display: none;
        width: min(320px, 100%);
        margin-top: 10px;
        padding: 6px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.08);
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 10px;
        align-items: center;
        justify-items: center;
      }

      .dir-btn {
        cursor: pointer;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-weight: 700;
        font-size: 18px;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .dir-up {
        grid-column: 2;
        grid-row: 1;
      }
      .dir-left {
        grid-column: 1;
        grid-row: 2;
      }
      .dir-right {
        grid-column: 3;
        grid-row: 2;
      }
      .dir-down {
        grid-column: 2;
        grid-row: 3;
      }

      @media (max-width: 560px) {
        body {
          padding: 10px 0; /* 给手机屏幕留出一点上下安全边距 */
        }

        .app {
          width: calc(100vw - 16px);
          gap: 10px;
        }

        .topbar {
          padding: 10px 10px;
        }

        button {
          padding: 10px 12px;
        }

        .mobile-controls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="title">
          <strong>贪吃蛇（Web 版）</strong>
          <span>方向键 / WASD 控制，吃到食物变长</span>
        </div>
        <div class="stats">
          <div class="pill">
            分数：<b id="score">0</b>
          </div>
          <div class="pill">
            最高：<b id="highScore">0</b>
          </div>
          <div class="pill">
            速度：<b id="speedLabel">—</b>
          </div>
        </div>
      </div>

      <div class="board-wrap">
        <div class="board">
          <canvas id="game" aria-label="贪吃蛇游戏画布" role="img"></canvas>
          <div class="hint">
            <div class="controls">
              <button id="btnStart" class="primary" type="button">开始 / 重新开始</button>
              <button id="btnPause" type="button">暂停</button>
            </div>
            <div>提示：不要撞墙或撞到自己</div>
          </div>

          <div id="mobileControls" class="mobile-controls" aria-label="手机触控方向控制">
            <button id="btnUp" class="dir-btn dir-up" type="button" aria-label="向上">U</button>
            <button id="btnLeft" class="dir-btn dir-left" type="button" aria-label="向左">L</button>
            <button id="btnRight" class="dir-btn dir-right" type="button" aria-label="向右">R</button>
            <button id="btnDown" class="dir-btn dir-down" type="button" aria-label="向下">D</button>
          </div>
          <div id="overlay" class="overlay">
            点击“开始 / 重新开始”或按 <b>Enter</b> 开始（手机可滑动或点方向按钮）
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("highScore");
        const speedLabelEl = document.getElementById("speedLabel");
        const overlayEl = document.getElementById("overlay");
        const btnStart = document.getElementById("btnStart");
        const btnPause = document.getElementById("btnPause");
        const btnUp = document.getElementById("btnUp");
        const btnDown = document.getElementById("btnDown");
        const btnLeft = document.getElementById("btnLeft");
        const btnRight = document.getElementById("btnRight");

        // 网格参数（保持像素风清晰）
        const cols = 24;
        const rows = 16;
        const cell = 20;

        // 画布分辨率（用于像素绘制；CSS 负责缩放）
        const logicalW = cols * cell;
        const logicalH = rows * cell;
        function setupCanvas() {
          const dpr = Math.max(1, window.devicePixelRatio || 1);
          canvas.width = logicalW * dpr;
          canvas.height = logicalH * dpr;
          // 让绘制仍在“逻辑像素坐标系”完成，避免需要改绘制逻辑
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        setupCanvas();

        const STORAGE_KEY = "snake.highScore.v1";

        let state = "idle"; // idle | running | paused | gameover
        let score = 0;
        let best = Number(localStorage.getItem(STORAGE_KEY) || "0");

        highScoreEl.textContent = String(best);
        scoreEl.textContent = "0";

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let lastTimer = null;

        function setOverlay(html) {
          overlayEl.innerHTML = html;
        }

        function setSpeedLabel(ms) {
          if (ms == null) {
            speedLabelEl.textContent = "—";
            return;
          }
          speedLabelEl.textContent = `${Math.round(ms)}ms/步`;
        }

        function randInt(min, maxInclusive) {
          return Math.floor(Math.random() * (maxInclusive - min + 1)) + min;
        }

        function samePos(a, b) {
          return a.x === b.x && a.y === b.y;
        }

        function isCellOnSnake(x, y) {
          for (const s of snake) if (s.x === x && s.y === y) return true;
          return false;
        }

        function placeFood() {
          // 简单避开蛇身；在本小地图上性能足够
          let tries = 0;
          while (tries++ < 2000) {
            const x = randInt(0, cols - 1);
            const y = randInt(0, rows - 1);
            if (!isCellOnSnake(x, y)) {
              food = { x, y };
              return;
            }
          }
          // 极端情况下兜底：直接放到中心（理论上不会触发）
          food = { x: Math.floor(cols / 2), y: Math.floor(rows / 2) };
        }

        function resetGame() {
          score = 0;
          scoreEl.textContent = "0";
          direction = { x: 1, y: 0 };
          nextDirection = { x: 1, y: 0 };

          const cx = Math.floor(cols / 2);
          const cy = Math.floor(rows / 2);
          snake = [
            { x: cx - 1, y: cy },
            { x: cx, y: cy },
            { x: cx + 1, y: cy },
          ];
          placeFood();

          state = "running";
          setOverlay("游戏进行中，祝你好运！");
          btnPause.textContent = "暂停";

          // 先渲染一次再开始计时
          draw();
          scheduleNextTick();
        }

        function setPaused(paused) {
          if (paused) {
            state = "paused";
            btnPause.textContent = "继续";
            setOverlay("已暂停，按“继续”或按空格恢复");
          } else {
            state = "running";
            btnPause.textContent = "暂停";
            setOverlay("游戏进行中！");
            scheduleNextTick();
          }
        }

        function gameOver(reason) {
          state = "gameover";
          setOverlay(`游戏结束：${reason}。点击“开始 / 重新开始”再来一局。`);
          btnPause.textContent = "暂停";

          if (score > best) {
            best = score;
            localStorage.setItem(STORAGE_KEY, String(best));
            highScoreEl.textContent = String(best);
          }
        }

        function calcStepMs() {
          // 分数越高越快（但给一个下限，保证可玩性）
          return Math.max(60, 140 - score * 2);
        }

        function scheduleNextTick() {
          if (lastTimer) clearTimeout(lastTimer);
          if (state !== "running") return;
          const stepMs = calcStepMs();
          setSpeedLabel(stepMs);
          lastTimer = setTimeout(tick, stepMs);
        }

        function tick() {
          if (state !== "running") return;

          // 允许在每一步只采纳一次方向
          direction = nextDirection;
          const head = snake[snake.length - 1];
          const newHead = { x: head.x + direction.x, y: head.y + direction.y };

          // 撞墙
          if (newHead.x < 0 || newHead.x >= cols || newHead.y < 0 || newHead.y >= rows) {
            draw(newHead, true);
            gameOver("撞墙");
            return;
          }

          const willEat = samePos(newHead, food);

          // 撞自己：如果本步不吃到食物，尾巴会移除，因此允许移动到“当前尾巴格子”
          for (let i = 0; i < snake.length; i++) {
            const s = snake[i];
            if (!samePos(s, newHead)) continue;
            if (!willEat && i === 0) continue; // 尾巴将被移除
            draw(newHead, true);
            gameOver("撞到自己");
            return;
          }

          snake.push(newHead);

          // 吃到食物
          if (willEat) {
            score += 1;
            scoreEl.textContent = String(score);
            placeFood();
            // 不删尾巴：变长
          } else {
            // 未吃到：移除尾巴
            snake.shift();
          }

          draw();
          scheduleNextTick();
        }

        function draw(explosionCell, isHit) {
          ctx.clearRect(0, 0, logicalW, logicalH);

          // 背景网格（更有“游戏感”但不过度）
          ctx.save();
          ctx.globalAlpha = 0.35;
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 1;
          for (let x = 0; x <= cols; x++) {
            ctx.beginPath();
            ctx.moveTo(x * cell + 0.5, 0);
            ctx.lineTo(x * cell + 0.5, rows * cell);
            ctx.stroke();
          }
          for (let y = 0; y <= rows; y++) {
            ctx.beginPath();
            ctx.moveTo(0, y * cell + 0.5);
            ctx.lineTo(cols * cell, y * cell + 0.5);
            ctx.stroke();
          }
          ctx.restore();

          // 食物
          const fx = food.x * cell;
          const fy = food.y * cell;
          ctx.save();
          const foodGrad = ctx.createRadialGradient(fx + cell / 2, fy + cell / 2, 2, fx + cell / 2, fy + cell / 2, cell);
          foodGrad.addColorStop(0, "rgba(255,255,255,0.95)");
          foodGrad.addColorStop(0.15, "rgba(255, 77, 109, 0.95)");
          foodGrad.addColorStop(1, "rgba(255, 77, 109, 0.35)");
          ctx.fillStyle = foodGrad;
          roundRect(ctx, fx + 3, fy + 3, cell - 6, cell - 6, 7);
          ctx.fill();
          ctx.restore();

          // 蛇
          for (let i = 0; i < snake.length; i++) {
            const s = snake[i];
            const x = s.x * cell;
            const y = s.y * cell;

            const t = i / Math.max(1, snake.length - 1); // 0..1
            const r = 7;

            ctx.save();
            const alpha = 0.95 - (1 - t) * 0.25;
            ctx.globalAlpha = alpha;

            // 蛇头略亮
            const isHead = i === snake.length - 1;
            const fill = isHead ? "rgba(61, 220, 151, 1)" : "rgba(61, 220, 151, 0.75)";
            ctx.fillStyle = fill;

            // 轻微描边提升像素观感
            ctx.strokeStyle = isHead ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.12)";
            ctx.lineWidth = 1;

            roundRect(ctx, x + 2.5, y + 2.5, cell - 5, cell - 5, r);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }

          // 撞击反馈
          if (explosionCell) {
            const ex = explosionCell.x * cell;
            const ey = explosionCell.y * cell;
            ctx.save();
            ctx.globalAlpha = isHit ? 0.75 : 0.35;
            ctx.fillStyle = "rgba(255, 77, 109, 0.55)";
            roundRect(ctx, ex + 3, ey + 3, cell - 6, cell - 6, 8);
            ctx.fill();
            ctx.restore();
          }

          // 头部朝向眼睛（简易但好看）
          const head = snake[snake.length - 1];
          if (head) {
            drawHeadEyes(head.x, head.y);
          }
        }

        function drawHeadEyes(hx, hy) {
          const x = hx * cell;
          const y = hy * cell;

          const eyeOffset = 6;
          const isX = direction.x !== 0;
          const isY = direction.y !== 0;

          // 眼睛左右/上下取决于移动方向
          let ox1 = 0,
            oy1 = 0,
            ox2 = 0,
            oy2 = 0;

          if (isX) {
            // 左右移动：眼睛在上下两点
            ox1 = x + cell / 2 - 4;
            oy1 = y + cell / 2 - eyeOffset;
            ox2 = x + cell / 2 + 4;
            oy2 = y + cell / 2 - eyeOffset;
            // 朝向嘴部偏移
            if (direction.x > 0) {
              ox1 = x + cell / 2 - 4;
              oy1 = y + cell / 2 - 5;
              ox2 = x + cell / 2 + 4;
              oy2 = y + cell / 2 - 5;
              // 视线向右
            } else {
              ox1 = x + cell / 2 - 4;
              oy1 = y + cell / 2 + 5 - 10;
              ox2 = x + cell / 2 + 4;
              oy2 = y + cell / 2 + 5 - 10;
            }
          }

          // 上面简单写法容易混淆：我们直接按方向分别画两眼。
          // 为了让代码更稳，这里用更清晰的分支覆盖。
          ctx.save();
          ctx.fillStyle = "rgba(11,18,32,0.95)";
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 1;

          // 默认眼睛位置：蛇头格子内的两个点
          let e1x = x + cell / 2 - 4;
          let e1y = y + cell / 2 - 4;
          let e2x = x + cell / 2 + 4;
          let e2y = y + cell / 2 + 4;

          if (direction.x === 1) {
            e1x = x + cell / 2 + 2;
            e2x = x + cell / 2 + 2;
            e1y = y + cell / 2 - 5;
            e2y = y + cell / 2 + 5;
          } else if (direction.x === -1) {
            e1x = x + cell / 2 - 2;
            e2x = x + cell / 2 - 2;
            e1y = y + cell / 2 - 5;
            e2y = y + cell / 2 + 5;
          } else if (direction.y === 1) {
            e1y = y + cell / 2 + 2;
            e2y = y + cell / 2 + 2;
            e1x = x + cell / 2 - 5;
            e2x = x + cell / 2 + 5;
          } else if (direction.y === -1) {
            e1y = y + cell / 2 - 2;
            e2y = y + cell / 2 - 2;
            e1x = x + cell / 2 - 5;
            e2x = x + cell / 2 + 5;
          }

          // 画眼点
          ctx.fillRect(e1x, e1y, 3, 3);
          ctx.fillRect(e2x, e2y, 3, 3);
          ctx.strokeRect(e1x, e1y, 3, 3);
          ctx.strokeRect(e2x, e2y, 3, 3);
          ctx.restore();
        }

        function roundRect(c, x, y, w, h, r) {
          // 兼容较老浏览器：用路径画圆角矩形
          const radius = Math.min(r, w / 2, h / 2);
          c.beginPath();
          c.moveTo(x + radius, y);
          c.arcTo(x + w, y, x + w, y + h, radius);
          c.arcTo(x + w, y + h, x, y + h, radius);
          c.arcTo(x, y + h, x, y, radius);
          c.arcTo(x, y, x + w, y, radius);
          c.closePath();
        }

        function trySetDirection(dx, dy) {
          // 禁止反向（避免一步到位撞到自己）
          if (dx === -direction.x && dy === -direction.y) return;
          nextDirection = { x: dx, y: dy };
        }

        window.addEventListener("keydown", (e) => {
          const key = e.key.toLowerCase();

          if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " "].includes(key)) {
            e.preventDefault();
          }

          if (key === "enter") {
            if (state === "idle" || state === "gameover") resetGame();
            return;
          }

          if (key === " ") {
            // 空格暂停/继续
            if (state === "running") setPaused(true);
            else if (state === "paused") setPaused(false);
            return;
          }

          if (state === "idle" || state === "gameover") return;

          if (key === "arrowup" || key === "w") trySetDirection(0, -1);
          else if (key === "arrowdown" || key === "s") trySetDirection(0, 1);
          else if (key === "arrowleft" || key === "a") trySetDirection(-1, 0);
          else if (key === "arrowright" || key === "d") trySetDirection(1, 0);
        });

        function ensureRunningForInput() {
          if (state === "idle" || state === "gameover") resetGame();
        }

        function bindDirButton(btn, dx, dy) {
          if (!btn) return;
          btn.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            // 禁止暂停/游戏结束时被触控方向“意外改变”
            if (state === "paused") return;
            ensureRunningForInput();
            trySetDirection(dx, dy);
          });
        }

        bindDirButton(btnUp, 0, -1);
        bindDirButton(btnDown, 0, 1);
        bindDirButton(btnLeft, -1, 0);
        bindDirButton(btnRight, 1, 0);

        // 移动端额外支持：在画布上滑动切换方向
        let touchStart = null;
        canvas.addEventListener("pointerdown", (e) => {
          if (e.pointerType !== "touch") return;
          touchStart = { x: e.clientX, y: e.clientY, t: Date.now() };
          e.preventDefault();
        });
        canvas.addEventListener("pointerup", (e) => {
          if (!touchStart) return;
          if (e.pointerType !== "touch") return;
          const dx = e.clientX - touchStart.x;
          const dy = e.clientY - touchStart.y;
          touchStart = null;

          // 避免轻微抖动导致误判
          const threshold = 28;
          if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

          if (state === "paused") return;
          ensureRunningForInput();

          if (Math.abs(dx) > Math.abs(dy)) {
            trySetDirection(dx > 0 ? 1 : -1, 0);
          } else {
            trySetDirection(0, dy > 0 ? 1 : -1);
          }
          e.preventDefault();
        });

        btnStart.addEventListener("click", () => {
          if (state === "running") {
            // 重新开始
            resetGame();
            return;
          }
          resetGame();
        });

        btnPause.addEventListener("click", () => {
          if (state === "running") setPaused(true);
          else if (state === "paused") setPaused(false);
        });

        // 初始渲染：显示一条静态蛇和食物提示
        function initIdle() {
          state = "idle";
          score = 0;
          scoreEl.textContent = "0";
          direction = { x: 1, y: 0 };
          nextDirection = { x: 1, y: 0 };

          const cx = Math.floor(cols / 2);
          const cy = Math.floor(rows / 2);
          snake = [
            { x: cx - 1, y: cy },
            { x: cx, y: cy },
            { x: cx + 1, y: cy },
          ];
          placeFood();
          setSpeedLabel(null);
          draw();
          setOverlay('点击“开始 / 重新开始”或按 <b>Enter</b> 开始（手机可滑动或点方向按钮）');
        }

        initIdle();

        // 设备旋转/缩放时重置画布像素比，保持清晰度
        window.addEventListener("resize", () => {
          setupCanvas();
          draw();
        });
      })();
    </script>
  </body>
</html>
